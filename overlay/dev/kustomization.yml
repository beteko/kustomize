namespace: tp7-kustomize

images:
  # On garde `images:` pour piloter le tag depuis l'overlay (démonstration rollout)
  # Ici on ne change pas le repository, seulement la version (newTag)
  - name: ghcr.io/beteko/spring-petclinic
    newName: ghcr.io/beteko/spring-petclinic
    newTag: 4.0.0-SNAPSHOT

# Référencer la baseline (réutiliser tous les manifests de base/)
resources:
  - "../../base"

# Appliquer les patches (modifications)
patches:
  # Type 1 : JSON Patch (replicas.yml) - syntaxe très spécifique, ex: /spec/replicas
  - path: replicas.yml
    target:
      kind: Deployment
      name: clinic-deploy
      
  # Type 2 : Strategic Merge Patch (patch-routing.yml) - YAML classique, fusionne avec original
  - path: patch-routing.yml